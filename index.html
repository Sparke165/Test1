<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dialler Scheduler V3</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 { text-align: center; }

input {
  width: 80px;
  padding: 5px;
}

button {
  padding: 10px 20px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #334155;
  padding: 8px;
  text-align: center;
}

.ok { color: lightgreen; }
.under { color: red; }
.over { color: orange; }

.shiftBox {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
<h1>📞 Dialler Scheduler V3</h1>

<div>
  AHT: <input id="aht" type="number" value="300">
  Shrinkage (%): <input id="shrinkage" type="number" value="30">
</div>

<table id="inputTable">
<thead>
<tr><th>Hour</th><th>Forecast Calls</th></tr>
</thead>
<tbody></tbody>
</table>

<button onclick="calculate()">Run Scheduler</button>

<table id="outputTable">
<thead>
<tr>
  <th>Hour</th>
  <th>Required</th>
  <th>Covered</th>
  <th>Gap</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="shiftBox">
<h2>Shift Allocation</h2>
<p id="shifts"></p>
</div>

</div>

<script>

const hours = [
"08:00","09:00","10:00","11:00","12:00",
"13:00","14:00","15:00","16:00","17:00"
];

const inputBody = document.querySelector("#inputTable tbody");

hours.forEach(hour => {
  inputBody.innerHTML += `
    <tr>
      <td>${hour}</td>
      <td><input type="number" value="0"></td>
    </tr>
  `;
});

function calculate() {
  const aht = parseFloat(document.getElementById("aht").value);
  const shrinkage = parseFloat(document.getElementById("shrinkage").value) / 100;

  const rows = document.querySelectorAll("#inputTable tbody tr");
  const output = document.querySelector("#outputTable tbody");
  output.innerHTML = "";

  let required = [];

  // Step 1: Calculate required agents
  rows.forEach(row => {
    const calls = parseFloat(row.children[1].children[0].value) || 0;
    const agents = Math.ceil(((calls * aht) / 3600) * (1 + shrinkage));
    required.push(agents);
  });

  // Step 2: Simple shift allocation logic
  let morning = Math.max(...required.slice(0, 5)); // 08–12 peak
  let mid = Math.max(...required.slice(2, 7));     // 10–14 peak
  let late = Math.max(...required.slice(4, 10));   // 12–17 peak

  // Step 3: Coverage simulation
  hours.forEach((hour, i) => {
    let covered = 0;

    if (i <= 7) covered += morning;
    if (i >= 2 && i <= 9) covered += mid;
    if (i >= 4) covered += late;

    const gap = covered - required[i];

    let className = "ok";
    if (gap < 0) className = "under";
    if (gap > 5) className = "over";

    output.innerHTML += `
      <tr>
        <td>${hour}</td>
        <td>${required[i]}</td>
        <td>${covered}</td>
        <td class="${className}">${gap}</td>
      </tr>
    `;
  });

  // Step 4: Display shifts
  document.getElementById("shifts").innerHTML = `
    Morning (08–16): ${morning} agents<br>
    Mid (10–18): ${mid} agents<br>
    Late (12–20): ${late} agents
  `;
}

</script>

</body>
</html>
