<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WFM Dashboard V6</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #020617;
  color: #38bdf8;
}

/* Sidebar */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  border-right: 1px solid #0ea5e9;
  position: fixed;
  padding: 20px;
  box-shadow: 0 0 15px #0ea5e9;
}

.sidebar h2 {
  color: #38bdf8;
  text-shadow: 0 0 10px #38bdf8;
}

/* Main */
.main {
  margin-left: 240px;
  padding: 20px;
}

/* Cards */
.card {
  background: rgba(2, 6, 23, 0.8);
  border: 1px solid #0ea5e9;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
  backdrop-filter: blur(6px);
}

/* Inputs */
input {
  background: #020617;
  border: 1px solid #0ea5e9;
  color: #38bdf8;
  padding: 6px;
  border-radius: 6px;
}

/* Buttons */
button {
  background: #38bdf8;
  color: black;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 0 10px #38bdf8;
}

button:hover {
  background: #0ea5e9;
  box-shadow: 0 0 20px #38bdf8;
}

/* Drag Zones */
.shift {
  min-height: 120px;
  padding: 10px;
  border: 2px dashed #38bdf8;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: inset 0 0 10px #38bdf8;
}

/* Agents */
.agent {
  background: #38bdf8;
  color: black;
  padding: 8px;
  margin: 6px;
  border-radius: 6px;
  cursor: grab;
  box-shadow: 0 0 10px #38bdf8;
  transition: 0.2s;
}

.agent:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #38bdf8;
}

/* Titles */
h1, h3, h4 {
  text-shadow: 0 0 10px #38bdf8;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>WFM Tool</h2>
  <p>Dashboard</p>
  <p>Scheduler</p>
  <p>Agents</p>
</div>

<div class="main">

  <h1>📊 Workforce Dashboard</h1>

  <div class="card">
    AHT <input id="aht" value="300">
    Shrinkage <input id="shrinkage" value="30">
  </div>

  <div class="card">
    <h3>Agents</h3>
    <input id="agentName" placeholder="Name">
    <button onclick="addAgent()">Add</button>
    <div id="agentPool"></div>
  </div>

  <div class="card">
    <h3>Shift Assignment (Drag & Drop)</h3>

    <div>
      <h4>Morning</h4>
      <div class="shift" id="morning" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>

    <div>
      <h4>Mid</h4>
      <div class="shift" id="mid" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>

    <div>
      <h4>Late</h4>
      <div class="shift" id="late" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>

  </div>

</div>

<script>

let agents = [];

function addAgent() {
  const name = document.getElementById("agentName").value;
  if (!name) return;

  const agent = document.createElement("div");
  agent.className = "agent";
  agent.draggable = true;
  agent.innerText = name;
  agent.id = "agent-" + Date.now();

  agent.ondragstart = drag;

  document.getElementById("agentPool").appendChild(agent);
}

function allowDrop(ev) {
  ev.preventDefault();
}

function drag(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}

</script>

</body>
</html>
