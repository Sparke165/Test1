<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dialler Scheduler V2</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h1 {
  text-align: center;
}

input {
  width: 80px;
  padding: 5px;
}

button {
  padding: 10px 20px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #334155;
  padding: 8px;
  text-align: center;
}

.ok { color: lightgreen; }
.under { color: red; }
.over { color: orange; }
</style>
</head>

<body>

<div class="container">
<h1>📞 Dialler Scheduler V2</h1>

<div>
  AHT (sec): <input id="aht" type="number" value="300">
  Shrinkage (%): <input id="shrinkage" type="number" value="30">
</div>

<table id="inputTable">
<thead>
<tr>
  <th>Hour</th>
  <th>Forecast Calls</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="calculate()">Calculate Staffing</button>

<table id="outputTable">
<thead>
<tr>
  <th>Hour</th>
  <th>Calls</th>
  <th>Agents Needed</th>
  <th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2 id="summary"></h2>

</div>

<script>

// Generate hours
const hours = [
"08:00","09:00","10:00","11:00","12:00",
"13:00","14:00","15:00","16:00","17:00"
];

const inputBody = document.querySelector("#inputTable tbody");

hours.forEach(hour => {
  const row = `
    <tr>
      <td>${hour}</td>
      <td><input type="number" value="0"></td>
    </tr>
  `;
  inputBody.innerHTML += row;
});

function calculate() {
  const aht = parseFloat(document.getElementById("aht").value);
  const shrinkage = parseFloat(document.getElementById("shrinkage").value) / 100;

  const rows = document.querySelectorAll("#inputTable tbody tr");
  const output = document.querySelector("#outputTable tbody");

  output.innerHTML = "";

  let totalAgents = 0;

  rows.forEach((row, index) => {
    const calls = parseFloat(row.children[1].children[0].value) || 0;

    // 15-min interval (900 seconds)
    const baseAgents = (calls * aht) / 3600;
    const finalAgents = Math.ceil(baseAgents * (1 + shrinkage));

    totalAgents += finalAgents;

    let status = "OK";
    let className = "ok";

    if (finalAgents > baseAgents * 1.2) {
      status = "Over";
      className = "over";
    } else if (finalAgents < baseAgents) {
      status = "Under";
      className = "under";
    }

    const newRow = `
      <tr>
        <td>${hours[index]}</td>
        <td>${calls}</td>
        <td class="${className}">${finalAgents}</td>
        <td>${status}</td>
      </tr>
    `;

    output.innerHTML += newRow;
  });

  document.getElementById("summary").innerText =
    "Total Agents Required Across Day: " + totalAgents;
}

</script>

</body>
</html>
