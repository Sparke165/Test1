<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dialler Scheduler V4</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container { max-width: 1200px; margin: auto; }
h1 { text-align: center; }

input { width: 80px; padding: 5px; }

button {
  padding: 10px 20px;
  margin-top: 15px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #334155;
  padding: 8px;
  text-align: center;
}

.ok { color: lightgreen; }
.under { color: red; }
.over { color: orange; }

</style>
</head>

<body>

<div class="container">
<h1>📞 Dialler Scheduler V4</h1>

<div>
  AHT: <input id="aht" type="number" value="300">
  Shrinkage (%): <input id="shrinkage" type="number" value="30">
</div>

<table id="inputTable">
<thead>
<tr><th>Hour</th><th>Forecast Calls</th></tr>
</thead>
<tbody></tbody>
</table>

<button onclick="runScheduler()">Run Scheduler</button>

<table id="outputTable">
<thead>
<tr>
  <th>Hour</th>
  <th>Required</th>
  <th>Available</th>
  <th>On Break</th>
  <th>Gap</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2 id="summary"></h2>

</div>

<script>

const hours = [
"08","09","10","11","12",
"13","14","15","16","17"
];

const inputBody = document.querySelector("#inputTable tbody");

hours.forEach(hour => {
  inputBody.innerHTML += `
    <tr>
      <td>${hour}:00</td>
      <td><input type="number" value="0"></td>
    </tr>
  `;
});

function runScheduler() {

  const aht = parseFloat(document.getElementById("aht").value);
  const shrinkage = parseFloat(document.getElementById("shrinkage").value) / 100;

  const rows = document.querySelectorAll("#inputTable tbody tr");
  const output = document.querySelector("#outputTable tbody");
  output.innerHTML = "";

  let required = [];

  // STEP 1: Required agents
  rows.forEach(row => {
    const calls = parseFloat(row.children[1].children[0].value) || 0;
    const agents = Math.ceil(((calls * aht) / 3600) * (1 + shrinkage));
    required.push(agents);
  });

  // STEP 2: Shift sizes
  let morning = Math.max(...required.slice(0, 5));
  let mid = Math.max(...required.slice(2, 7));
  let late = Math.max(...required.slice(4, 10));

  // STEP 3: Build agents
  let agents = [];

  function createAgents(count, shift) {
    for (let i = 0; i < count; i++) {
      agents.push({
        shift: shift,
        breakHour: Math.floor(Math.random() * 6) + 2, // random break timing
        lunchHour: Math.floor(Math.random() * 6) + 3
      });
    }
  }

  createAgents(morning, "morning");
  createAgents(mid, "mid");
  createAgents(late, "late");

  // STEP 4: Simulate each hour
  let totalGap = 0;

  hours.forEach((h, i) => {

    let working = 0;
    let onBreak = 0;

    agents.forEach(agent => {

      let active = false;

      if (agent.shift === "morning" && i <= 7) active = true;
      if (agent.shift === "mid" && i >= 2 && i <= 9) active = true;
      if (agent.shift === "late" && i >= 4) active = true;

      if (!active) return;

      // Break logic
      if (i === agent.breakHour || i === agent.lunchHour) {
        onBreak++;
      } else {
        working++;
      }

    });

    const gap = working - required[i];
    totalGap += gap;

    let className = "ok";
    if (gap < 0) className = "under";
    if (gap > 5) className = "over";

    output.innerHTML += `
      <tr>
        <td>${h}:00</td>
        <td>${required[i]}</td>
        <td>${working}</td>
        <td>${onBreak}</td>
        <td class="${className}">${gap}</td>
      </tr>
    `;
  });

  document.getElementById("summary").innerText =
    "Net Staffing Gap (Day): " + totalGap;

}

</script>

</body>
</html>
